[build]
  command    = "npm run build"
  publish    = "dist"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, s-maxage=3600, must-revalidate"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, s-maxage=3600, must-revalidate"

# SOFT-LAUNCH: REMOVE this whole block before public launch.
# Sends X-Robots-Tag for every response so Google/Bing skip the site
# even if they ignore robots.txt — defense in depth for the period
# where budget figures are placeholders.
[[headers]]
  for = "/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
